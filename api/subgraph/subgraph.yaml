specVersion: 1.0.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: NarnUSD
    network: sepolia
    source:
      address: "0x5f78eAbe8Bfe73b2EE23e51E9645D545649d20D4"
      abi: NarnUSD
      startBlock: 10406308
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Protocol
        - Account
        - Transfer
        - AutoBurn
        - CreditProfileUpdate
        - AgentChange
      abis:
        - name: NarnUSD
          file: ./abis/NarnUSD.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleTransfer
        - event: AutoBurned(indexed address,uint256,uint256)
          handler: handleAutoBurned
        - event: CreditProfileUpdated(indexed address,uint64,uint128)
          handler: handleCreditProfileUpdated
        - event: AgentRegistered(indexed address,bool)
          handler: handleAgentRegistered
      file: ./src/mapping.ts
